name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    name: Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo check

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy -- -D warnings

  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --check

  docs-drift:
    name: Check Docs Drift
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: ./scripts/check-docs-drift.sh

  carina-pin:
    name: Check carina-core Pin
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # The script clones carina itself (filtered) to verify the
      # pinned rev is consistent and >= .carina-core-min-rev.
      - run: ./scripts/check-carina-pin.sh

  codegen-check:
    name: Codegen Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - uses: Swatinem/rust-cache@v2
      - name: Run schema codegen (from committed cache, no AWS calls)
        run: ./carina-provider-awscc/scripts/generate-schemas.sh --from-cache-only
      - name: Verify no uncommitted changes
        run: |
          if ! git diff --exit-code; then
            echo "::error::Codegen produced uncommitted changes. Run 'aws-vault exec <profile> -- ./carina-provider-awscc/scripts/generate-schemas.sh' locally and commit the results (or commit cfn-schema-cache/ updates if AWS-side schemas changed)."
            exit 1
          fi

  # docs-drift and docs-check cover different gaps: docs-drift verifies each
  # schema has a tracked doc and catches missing/orphan files via a directory
  # scan, while docs-check regenerates docs and uses git diff to catch tracked
  # content drift.
  docs-check:
    name: Check Docs Content
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - uses: Swatinem/rust-cache@v2
      - name: Run docs generation (from committed cache, no AWS calls)
        run: ./scripts/generate-docs.sh --from-cache-only
      - name: Verify no uncommitted changes
        run: |
          if ! git diff --exit-code; then
            echo "::error::Docs generation produced uncommitted changes. Run 'aws-vault exec <profile> -- ./scripts/generate-docs.sh' locally and commit the regenerated generated-docs/."
            exit 1
          fi

  wasm-build:
    name: WASM Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-wasip2
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: wasm
      - run: cargo build -p carina-provider-awscc --target wasm32-wasip2 --release
      - name: Cache vela-cli
        id: cache-vela
        uses: actions/cache@v4
        with:
          path: ~/.cargo/bin/vela
          key: vela-cli-${{ runner.os }}-v1
      - name: Install vela-cli
        if: steps.cache-vela.outputs.cache-hit != 'true'
        run: cargo install --git https://github.com/mizzy/vela vela-cli --quiet
      - name: Optimize WASM with vela
        run: vela optimize target/wasm32-wasip2/release/carina-provider-awscc.wasm -o target/wasm32-wasip2/release/carina-provider-awscc.wasm
      - uses: actions/upload-artifact@v4
        with:
          name: carina-provider-awscc.wasm
          path: target/wasm32-wasip2/release/carina-provider-awscc.wasm
